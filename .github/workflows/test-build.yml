name: Test and Build Reusable

on:
  workflow_call:
    inputs:
      push_image:
        required: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: echo "Tests OK"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/cliente-prueba:${{ github.sha }} .

      - name: Login to Docker Hub
        if: inputs.push_image
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Push Docker image
        if: inputs.push_image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/cliente-prueba:${{ github.sha }}